<svg xmlns="http://www.w3.org/2000/svg" width="600" height="18" viewBox="0 0 600 18" role="img" aria-label="divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3df2"/>
      <stop offset="0.5" stop-color="#9b5cff"/>
      <stop offset="1" stop-color="#00e0ff"/>
    </linearGradient>
    <clipPath id="bar"><rect x="44" y="7" width="512" height="4" rx="2"/></clipPath>
  </defs>
  <rect x="44" y="7" width="512" height="4" rx="2" fill="url(#g)"/>
  <g clip-path="url(#bar)">
    <rect x="-90" y="7" width="70" height="4" fill="#ffffff" opacity="0.75">
      <animate attributeName="x" from="-90" to="600" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g transform="rotate(45 300 9)">
    <rect x="294" y="3" width="12" height="12" fill="#ffffff"/>
    <rect x="296.5" y="5.5" width="7" height="7" fill="#9b5cff"/>
  </g>
  <circle cx="44" cy="9" r="3.2" fill="#ff3df2"/>
  <circle cx="556" cy="9" r="3.2" fill="#00e0ff"/>
</svg>
