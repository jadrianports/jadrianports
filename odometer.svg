<svg xmlns="http://www.w3.org/2000/svg" width="196" height="46" viewBox="0 0 196 46" role="img" aria-label="visitor counter">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="196" height="46" rx="4" fill="#2e2e2e"/>
  <rect x="4" y="4" width="188" height="38" rx="2" fill="#070707" stroke="#000" stroke-width="1"/>
  <!-- cell separators -->
  <g stroke="#1c1c1c" stroke-width="1">
    <line x1="31" y1="6" x2="31" y2="40"/>
    <line x1="58" y1="6" x2="58" y2="40"/>
    <line x1="85" y1="6" x2="85" y2="40"/>
    <line x1="112" y1="6" x2="112" y2="40"/>
    <line x1="139" y1="6" x2="139" y2="40"/>
    <line x1="166" y1="6" x2="166" y2="40"/>
  </g>
  <!-- LED digits -->
  <g font-family="'Courier New',monospace" font-weight="bold" font-size="27" fill="#39ff14" text-anchor="middle" filter="url(#glow)">
    <text x="18"  y="33">0</text>
    <text x="45"  y="33">0</text>
    <text x="72"  y="33">1</text>
    <text x="99"  y="33">3</text>
    <text x="126" y="33">3</text>
    <text x="153" y="33">3</text>
    <text x="180" y="33">7</text>
  </g>
</svg>
