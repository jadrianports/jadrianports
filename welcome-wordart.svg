<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="240" viewBox="0 0 1100 240" role="img" aria-label="Welcome to my GitHub Profile">
  <defs>
    <!-- flowing rainbow that sweeps horizontally through the letters -->
    <linearGradient id="rb" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="550" y2="0" spreadMethod="repeat">
      <stop offset="0"    stop-color="#ff2d2d"/>
      <stop offset="0.17" stop-color="#ff9a00"/>
      <stop offset="0.34" stop-color="#ffe600"/>
      <stop offset="0.50" stop-color="#3cff00"/>
      <stop offset="0.67" stop-color="#00b3ff"/>
      <stop offset="0.84" stop-color="#7a2bff"/>
      <stop offset="1"    stop-color="#ff2d2d"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="550 0" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- classic WordArt 3D drop shadow -->
    <filter id="sh" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="0.5"/>
      <feDropShadow dx="7" dy="7" stdDeviation="0" flood-color="#888888" flood-opacity="0.3"/>
    </filter>
    <!-- the smile arc the text rides on (long enough to NOT clip) -->
    <path id="arc" d="M 80 195 Q 550 35 1020 195" fill="none"/>
  </defs>

  <!-- twinkling gold stars -->
  <g fill="#ffd400" font-family="sans-serif">
    <text x="140" y="74" font-size="26">✦<animate attributeName="opacity" values="0.15;1;0.15" dur="1.4s" repeatCount="indefinite"/></text>
    <text x="300" y="56" font-size="18">✦<animate attributeName="opacity" values="1;0.25;1" dur="2.1s" repeatCount="indefinite"/></text>
    <text x="545" y="40" font-size="22">★<animate attributeName="opacity" values="0.3;1;0.3" dur="1.1s" repeatCount="indefinite"/></text>
    <text x="780" y="52" font-size="18">★<animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></text>
    <text x="945" y="66" font-size="24">✦<animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></text>
  </g>

  <!-- arched WordArt with animated rainbow fill + gentle bob -->
  <g filter="url(#sh)" font-family="'Arial Black', Impact, 'Franklin Gothic Heavy', sans-serif" font-weight="900">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="2.6s" repeatCount="indefinite"/>
    <text font-size="48" letter-spacing="1" fill="url(#rb)" stroke="#000000" stroke-width="2" paint-order="stroke">
      <textPath href="#arc" startOffset="50%" text-anchor="middle">Welcome to my GitHub Profile</textPath>
    </text>
  </g>
</svg>
