<svg xmlns="http://www.w3.org/2000/svg" width="536" height="35" viewBox="0 0 536 35" role="img" aria-label="retro web buttons">
  <defs>
    <style>.t{font-family:'Courier New',monospace;font-weight:bold;text-anchor:middle}</style>
    <pattern id="haz" width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#ffcc00"/>
      <rect width="7" height="14" fill="#111111"/>
    </pattern>
  </defs>

  <!-- NETSCAPE NOW! -->
  <g transform="translate(24,2)">
    <rect width="88" height="31" fill="#16166b"/>
    <text class="t" x="44" y="14" font-size="9" fill="#ffffff">NETSCAPE</text>
    <text class="t" x="44" y="26" font-size="11" fill="#33ff66">NOW!</text>
    <path d="M0 31 L0 0 L88 0" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M88 0 L88 31 L0 31" stroke="#000000" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- MADE WITH NOTEPAD -->
  <g transform="translate(124,2)">
    <rect width="88" height="31" fill="#c3c7cb"/>
    <text class="t" x="44" y="14" font-size="8" fill="#111111">MADE WITH</text>
    <text class="t" x="44" y="26" font-size="10" fill="#111111">NOTEPAD</text>
    <path d="M0 31 L0 0 L88 0" stroke="#ffffff" stroke-width="2" fill="none"/>
    <path d="M88 0 L88 31 L0 31" stroke="#5a5a5a" stroke-width="2" fill="none"/>
  </g>

  <!-- VALID HTML 4.0 -->
  <g transform="translate(224,2)">
    <rect width="88" height="31" fill="#e8730c"/>
    <text class="t" x="44" y="14" font-size="9" fill="#ffffff">VALID</text>
    <text class="t" x="44" y="26" font-size="10" fill="#ffffff">HTML 4.0</text>
    <path d="M0 31 L0 0 L88 0" stroke="#ffd9b0" stroke-width="2" fill="none"/>
    <path d="M88 0 L88 31 L0 31" stroke="#7a3a00" stroke-width="2" fill="none"/>
  </g>

  <!-- UNDER CONSTRUCTION -->
  <g transform="translate(324,2)">
    <rect width="88" height="31" fill="#ffcc00"/>
    <rect x="0" y="0" width="88" height="5" fill="url(#haz)"/>
    <rect x="0" y="26" width="88" height="5" fill="url(#haz)"/>
    <text class="t" x="44" y="16" font-size="8" fill="#111111">UNDER</text>
    <text class="t" x="44" y="24" font-size="7" fill="#111111">CONSTRUCTION</text>
    <path d="M0 31 L0 0 L88 0" stroke="#fff1b0" stroke-width="2" fill="none"/>
    <path d="M88 0 L88 31 L0 31" stroke="#7a6000" stroke-width="2" fill="none"/>
  </g>

  <!-- BEST VIEWED 1024x768 -->
  <g transform="translate(424,2)">
    <rect width="88" height="31" fill="#000000"/>
    <text class="t" x="44" y="14" font-size="8" fill="#33ff99">BEST VIEWED</text>
    <text class="t" x="44" y="26" font-size="9" fill="#33ff99">1024x768</text>
    <path d="M0 31 L0 0 L88 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
    <path d="M88 0 L88 31 L0 31" stroke="#000000" stroke-width="2" fill="none"/>
  </g>
</svg>
